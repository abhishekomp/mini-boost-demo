{{/*
  This is the Deployment template for name-service.
  Compare this to phase3-kubernetes-raw/k8s/name-service-deployment.yaml.
  Every hardcoded value there is now a {{ .Values.xxx }} expression here.
  That is the entire point of Helm: replace hardcoded values with variables.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.container.port }}
          livenessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.container.port }}
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.container.port }}
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

