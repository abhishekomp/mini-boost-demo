---
apiVersion: v1
kind: Service
metadata:
  name: greeting-service
  labels:
    app: greeting-service
spec:
  # NodePort makes this Service reachable from OUTSIDE the cluster
  # (from your Mac's browser or curl command).
  # Kubernetes assigns a port in the range 30000-32767 on every node.
  # We use this only for greeting-service because it is the "front door" —
  # the one we want to call from our Mac.
  # name-service stays ClusterIP (internal only) because only greeting-service calls it.
  type: NodePort

  selector:
    app: greeting-service

  ports:
    - port: 8080          # Port inside the cluster
      targetPort: 8080    # Port on the Pod
      nodePort: 30080     # Fixed external port on the node (your Mac via Colima)
      protocol: TCP

